name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dnd
          POSTGRES_PASSWORD: dnd
          POSTGRES_DB: dnd
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dnd -d dnd"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      POSTGRES_HOST: localhost
      POSTGRES_USER: dnd
      POSTGRES_PASSWORD: dnd
      JWT_SECRET: ci-test-secret-not-for-production-aaaaaaaaaaaaaaaaaa
      ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        working-directory: backend
        run: pytest -v
