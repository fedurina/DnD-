server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: все ненайденные пути отдаём index.html, чтобы react-router работал
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Хешированные ассеты Vite — кешируем агрессивно
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Точку входа и PWA-артефакты НЕ кешируем —
    # иначе после релиза браузер будет долго отдавать старую версию
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
